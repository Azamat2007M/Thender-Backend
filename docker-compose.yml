version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: thender_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: thender_web
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - '.env'
    depends_on:
      - db

volumes:
  postgres_data: